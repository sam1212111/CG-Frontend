<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4c542;
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    width:320px;
    background:white;
    border-radius:20px;
    box-shadow:10px 10px 0 black;
    overflow:hidden;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.content{
    padding:20px;
}

.tag{
    display:inline-block;
    background:#f4c542;
    padding:5px 10px;
    border-radius:5px;
    font-size:14px;
    font-weight:bold;
    margin-bottom:10px;
}

.date{
    font-size:12px;
    color:#555;
    margin-bottom:10px;
}

.title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.desc{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
    line-height:1.5;
}

.author{
    display:flex;
    align-items:center;
    gap:10px;
}

.author img{
    width:35px;
    height:35px;
    border-radius:50%;
}

.author span{
    font-weight:bold;
}
</style>

</head>

<body>

<div class="card">
    <img src="https://images.unsplash.com/photo-1523430410476-0185cb1f6ff9" alt="cover">

    <div class="content">
        <div class="tag">Learning</div>
        <div class="date">Published 21 Dec 2023</div>
        <div class="title">HTML & CSS foundations</div>
        <div class="desc">
            These languages are the backbone of every website, defining structure, content, and presentation.
        </div>

        <div class="author">
            <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="author">
            <span>Greg Hooper</span>
        </div>
    </div>
</div>

</body>
</html>
