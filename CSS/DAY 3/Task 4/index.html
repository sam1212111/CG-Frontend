<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <nav>
        <div id="lbox">
            <img src="sun.png" alt="sun" id="logosun">
            <p id="title">Weather Now</p>
        </div>
        <div id="ubox">
            <img src="image.png" alt="settings" id="icon">
            <select id="units">
                <option value="" disabled selected>Units</option>
                <option value="celsius">Celsius</option>
                <option value="fahrenheit">Fahrenheit</option>
            </select>
        </div>
    </nav>
</body>

<div id="main">
    <h1 id="heading">How's the Sky Looking today?</h1>
    <div id="insideMain">
        <div class="search-box">
            <img src="https://www.svgrepo.com/show/532555/search.svg" class="icon">
            <input type="search" placeholder="Search for a place...">
            <button id="search-btn">Search</button>
        </div>

    </div>
</div>

</html>
