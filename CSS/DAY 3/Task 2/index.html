<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="main">
    <h1 id="heading">Contact Us</h1>
<form type="submit">
    <div class="container">
    <label for="firstName">FirstName *</label>
    <label for="lastName">LastName *</label>
    <input type="text" id="firstName" name="firstName" required>

    
    <input type="text" id="lastName" name="lastName" required>
</div>
    <div class="email">
    <label for="email">Email Address *</label>
    <input type="email" id="email" name="email" required>
    </div>

    <div class="full">
            <label>Query Type *</label>
            <div class="radio-group">
                <label><input type="radio" name="q" class="r"> General Enquiry</label>
                <label><input type="radio" name="q" class="r"> Support Request</label>
            </div>
        </div>

    <label for="message">Message *</label><br>
    <textarea id="message" name="message" required></textarea><br>
<label><input type="checkbox" name="consent" required> I consent to being contacted by the team</label><br>
    <button type="submit">Submit</button>

</form>

</div>

</body>
</html>
