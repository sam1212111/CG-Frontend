<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link{
            color: blue;
        }
        a:visited{
            color:green;
        }
        a:active{
            color:yellow;
        }
        a:hover{
            color:cyan;
        }
        h1:hover::after{
            content:"Arpit ki lugaai";
            color:orange
        }
        h1:hover::before{
            content:"Oh Bhai! ";
        }
    </style>
</head>
<body>
    <a href="amazon.com">Click here</a>
    <h1>Hello </h1>
</body>
</html>
