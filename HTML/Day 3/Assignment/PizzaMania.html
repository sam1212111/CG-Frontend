<!DOCTYPE html>
<html>
<head>
    <title>Pizza Order Form</title>
</head>
<body>

    <h1>🍕 Pizza Order Here</h1>
    <hr>

    <form>

        <!-- User Details -->
        First Name:<br>
        <input type="text" name="fname"><br><br>

        Last Name:<br>
        <input type="text" name="lname"><br><br>

        Email:<br>
        <input type="email" name="email"><br><br>

        Contact:<br>
        <input type="tel" name="contact"><br><br>

        Preferred Delivery Date:<br>
        <input type="date" name="date"><br><br>

        <!-- Size -->
        <b>Size:</b><br>
        <input type="radio" name="size"> Small
        <input type="radio" name="size"> Medium
        <input type="radio" name="size"> Large
        <br><br>

        <!-- Outlet -->
        Outlet:<br>
        <select>
            <option>Select Outlet</option>
            <option>Delhi</option>
            <option>Mumbai</option>
            <option>Bangalore</option>
        </select>
        <br><br>

        <!-- Menu -->
        <h2>Menu</h2>

        <input type="checkbox"> Hawaiian (150₹ / 250₹)
        Quantity:
        <select>
            <option>1</option>
            <option>2</option>
            <option>3</option>
        </select>
        <br><br>

        <input type="checkbox"> Pepperoni (140₹ / 240₹)
        Quantity:
        <select>
            <option>1</option>
            <option>2</option>
            <option>3</option>
        </select>
        <br><br>

        <input type="checkbox"> Veggie (120₹ / 220₹)
        Quantity:
        <select>
            <option>1</option>
            <option>2</option>
            <option>3</option>
        </select>
        <br><br>
        <!-- Submit -->
        <input type="submit" value="Order Now">
    </form>
</body>
</html>
