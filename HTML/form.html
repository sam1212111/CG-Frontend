<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form action="#" method="post">

    <label>Full Name:</label><br>
    <input type="text" name="fullname" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" required><br><br>

    <label>Phone Number:</label><br>
    <input type="tel" name="phone"><br><br>

    <label>Age:</label><br>
    <input type="number" name="age" min="1" max="100"><br><br>

    <label>Date of Birth:</label><br>
    <input type="date" name="dob"><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
    <input type="radio" name="gender" value="other"> Other<br><br>

    <label>Hobbies:</label><br>
    <input type="checkbox" name="hobbies" value="sports"> Sports
    <input type="checkbox" name="hobbies" value="music"> Music
    <input type="checkbox" name="hobbies" value="reading"> Reading<br><br>

    <label>Country:</label><br>
    <select name="country">
        <option value="">Select</option>
        <option value="india">India</option>
        <option value="usa">USA</option>
        <option value="uk">UK</option>
    </select><br><br>

    <label>Upload File:</label><br>
    <input type="file" name="file"><br><br>

    <label>Favorite Color:</label><br>
    <input type="color" name="color"><br><br>

    <label>Range:</label><br>
    <input type="range" name="range" min="0" max="100"><br><br>

    <label>Website:</label><br>
    <input type="url" name="website"><br><br>

    <label>Search:</label><br>
    <input type="search" name="search"><br><br>

    <label>Time:</label><br>
    <input type="time" name="time"><br><br>

    <label>Month:</label><br>
    <input type="month" name="month"><br><br>

    <label>Week:</label><br>
    <input type="week" name="week"><br><br>

    <label>Message:</label><br>
    <textarea name="message" rows="4" cols="30"></textarea><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>
