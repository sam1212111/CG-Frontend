<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="">
        Name:
        <br>
        <label for="fname">FirstName:</label>
        <input type="text" id="fname" name="fName" required>
        <label for="lname">LastName:</label>
        <input type="text" id="lname" name="lName">

        <br>
        <br>
        Gender:
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="female">Female</label>
        <input type="radio" name="gender"  id="female" value="female">
        <br><br>
        <label for="email">Email:</label>
        <input id="email" name="email" type="email" required placeholder="@gmail.com">
        <br><br>

        <label for="type">Room Type</label>
        <select name="roomType" id="type">
            <option value="default" selected>-select-</option>
            <option value="Simple">Simple</option>
            <option value="Double">Double</option>
            <option value="XL">XL</option>
        </select>
        <br><br>
        <label for="gCount"></label>
        <select name="GuestCount" id="gCount">
            <option value="no value selected" selected >eg:1,2,3...</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
        <br><br>
        <label for="dt">Arrival Date And Time</label>
        <input type="datetime-local" id="dt">
        <br><br>
        <label for="dDate">Departure Date</label>
        <input type="date" id="dDate" name="departure data">
        <br><br>
        <label for="state">State:</label>
        <select name="State" id="state">
            <optgroup label="India">
                <option value="none selected" selected>Choose a state</option>
                <option value="Punjab">Punjab</option>
                <option value="Delhi">Delhi</option>
                <option value="Mumbai">Mumbai</option>
                <option value="Bangalore">Bangalore</option>
            </optgroup> 
        </select>
        <br><br>
        <input type="checkbox" id="terms" name="terms" value="accepted">
        <label for="terms">I agree to the terms and conditions</label>
        <br><br>
        <textarea name="Requests" rows="4" cols="20" placeholder="Special Requests..."></textarea>
        <br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
